schema_version = 1

[schedule.mini]
interval = "10m"
duration = "20s"

[schedule.long]
interval = "30m"
duration = "5m"
after_minis = 2

[schedule.rest]
interval = "2h"
duration = "30m"
after_longs = 2

[completion]
manual_resume = false
sound = "warm-rise" # warm-rise | soft-bloom | deep-halo | clean-chime

[notifications]
enabled = true
mini_lead = "10s"
long_lead = "30s"
rest_lead = "1m"
actions = true

[skip.mini]
enabled = true

[skip.long]
enabled = true

[skip.rest]
enabled = true

[postpone.mini]
enabled = true
duration = "2m"
# max_postponements = 2 # omit for unlimited postponements

[postpone.long]
enabled = true
duration = "5m"
# max_postponements = 2 # omit for unlimited postponements

[postpone.rest]
enabled = true
duration = "10m"
# max_postponements = 2 # omit for unlimited postponements

[strict]
mode = "delay" # off | delay | entire
minimum_visible = "10s" # delay: how long pause/reset stay locked; skip/postpone are always immediate
allow_postpone_during_lockout = false
inhibit_shortcuts = true

[display]
mode = "dim-all-content-one" # all | focused | cursor | primary | configured | dim-all-content-one
content_selector = "focused" # focused | cursor | primary | configured
# preferred_monitor = "edid:Dell Inc.:DELL U2723QE:ABC123"
# primary_monitor = "connector:eDP-1"
fallback = ["focused", "cursor", "primary"]
layer = "overlay" # overlay | top
opacity = 0.88
dim_color = "#101418"
pointer_mode = "block" # block | controls | none
keyboard_mode = "on-demand" # shortcut inhibition uses exclusive focus while active

[content]
show_message = true
messages = [
  "Look away from the screen and relax your eyes.",
  "Stand up, breathe slowly, and loosen your shoulders.",
  "Let your hands rest and change your posture.",
  "Go grab a glass of water.",
  "Slowly look all the way left, then right.",
  "Slowly look all the way up, then down.",
  "Close your eyes and take few deep breaths.",
  "Close your eyes and relax.",
  "Stretch your legs.",
  "Stretch your arms.",
  "Is your sitting posture correct?",
  "Slowly turn head to side and hold for 10 seconds.",
  "Slowly tilt head to side and hold for 5-10 seconds.",
  "Stand from your chair and stretch.",
  "Refocus your eyes on an object at least 20 meters away.",
  "Take a moment to think about something you appreciate.",
  "Take a moment to smile at being alive.",
  "A truly ergonomic workstation is one that you regularly push away from.",
  "Close your eyes and count your breaths.",
  "Close your eyes and name the things you hear.",
  "Place your fingertips on your shoulders. Roll your shoulders forward for 10 seconds, then backward.",
  "Raise your right arm, stretch it over your head to the left, and hold for 10 seconds. Repeat on the other side.",
  "With your right hand, grab each finger of your left hand in turn and squeeze. Repeat on the other side.",
  "Stand up and do a lunge. Hold for 10 seconds, then do the other leg.",
  "Close your eyes and simply notice whatever arises in current moment, without judgement.",
  "Focus every 20 minutes for 20 seconds on an object at 20 feet distance.",
  "If you need help, ask for it.",
  "Do one thing at a time.",
  "Is your attention spent wisely?",
  "Change your sitting posture.",
  "Expose your eyes to natural light.",
  "With your eyes closed, slowly and gently raise your eyes to the ceiling and back down to the floor.",
  "With your eyes closed, slowly and gently move your eyes to the left, then slowly to the right.",
  "Shake your hands out to get some relief.",
  "One at a time, touch the tip of each finger to the tip of your thumb so they make an O-shape.",
  "Make a fist and then slide your fingers up until they point toward the ceiling, like you're telling someone to stop.",
  "Make a fist and then fan your fingers out and stretch them as far as you can.",
  "Sit tall, arms hanging at your sides, and slowly rotate neck in one direction in a large circle.",
  "Stand tall and slowly tilt your head toward the shoulder using the same hand until you feel a stretch.",
  "Stand tall with your arms by your side. Squeeze your shoulder blades together and hold.",
  "Stand tall with your arms raised along your shoulders. Move hands slightly behind your back, hold for a second and return.",
  "Sit on the edge of your chair, twist your torso to one side and hold for 10-15 seconds. Repeat on the other side.",
  "Stand up and put one foot on a nearby object, like a chair or step stool. Keep your knee bent and hold for 10-15 seconds. Repeat with the other foot.",
  "Stand with your feet shoulder-width apart, lower your body down as if you were sitting back into a chair, then stand back up. Repeat several times.",
  "Stand with your back and hands on a wall, then slowly move your arms up and down as if you were making snow angels.",
  "Stand facing a wall and place your hands on it, then do several push-ups.",
  "Sit on the edge of your chair and extend one leg straight out in front of you, holding for 10-15 seconds. Repeat with the other leg.",
  "Stand facing a wall, put one foot back and the other foot forward, then lean into the wall. Repeat with the other leg.",
  "Hold one arm straight up, then use the other arm to gently push the elbow of the first arm towards your head. Hold for 10-15 seconds. Repeat with the other arm.",
  "Tilt your head to one side, then to the other side, and then gently tilt it forward and backward.",
  "Reach one arm across your chest, hold onto the elbow with the other hand, and gently pull it in towards your chest. Repeat with the other arm.",
  "Stand up, put one foot on a nearby object, like a chair or step stool, and reach down to touch your toes. Repeat with the other leg.",
  "Stand in a doorway and place one arm on each side of the doorway, then gently lean forward until you feel a stretch in your chest.",
  "Sit on the edge of a chair or on the floor, and place the soles of your feet together, gently pressing down with your elbows to stretch your inner thighs.",
  "Do you find it hard to take a break alone? Try to do it with a co-worker. Aside from making it easier to stick to breaks, you will have a chance to get to know them better. Taking breaks together increases productivity.",
  "Do you ever notice how your brain can figure things out by itself? All it takes is to step away from the computer and take a break to think about something totally unrelated.",
  "Rest is a key component in ensuring the performance of the musculoskeletal system. Frequent breaks can decrease the duration of a task and help lower the exposure to ergonomic injury risk.",
  "Research studies suggest that mindfulness-based exercises help decrease anxiety, depression, stress, and pain, and help improve general health, mental health, and quality of life. Not sure how to start? There are numerous apps to help you out.",
  "Looking at screens for a long time causes you to blink less, thus exposing your eyes to the air. Blink rapidly for a few seconds to refresh the tear film and clear dust from the eye surface.",
  "Improper height and angle of the keyboard, mouse, monitor or working surface can cause health problems. Take some time to read about desk ergonomics.",
  "There are a lot of ways you can exercise within your office. Try marching in place or doing desk push-ups.",
  "Do you have a stability ball or standing work desk? Consider replacing your desk chair with them for a while.",
  "Are you daydreaming or having trouble focusing? It is a sign that you need to take a break.",
  "How about taking a no-tech walk?",
  "Emerging research shows that sitting for long periods of time contributes to risk of metabolic syndrome, heart attack and stroke risk and overall death risk, among others. Taking regular walking breaks can help your circulation, working to counteract some of those problems.",
  "How about moving meetings from the conference room to the concourse? Walking not only burns calories but it may even foster a sense of collaboration.",
  "Take your time and eat some fruit. Slowly. Notice the flavor, the texture, the freshness.",
  "Walk to the farthest bathroom in the worksite facility when going to the restroom.",
  "Going on coffee break? Consider doing a 5-minute walk every time you go for one.",
  "Do not email or message office colleagues, walk to their desks to communicate with them.",
  "In a study of healthy volunteers, NIH researchers found that taking short breaks, early and often, may help our brains learn new skills.",
  "Evidence suggests small amounts of regular exercise can bring dramatic health benefits, including measurably reducing stress.",
  "Have you found your stretch-ly-routine? Do not forget to repeat it for more than once to better fight effects of prolonged sitting.",
  "Extend your arms with the palms facing towards you, then slowly rotate the hands four times clockwise, then four times counter-clockwise.",
  "Join your hands behind your head, then lift them together up above your head ending with your palms facing upward.",
  "For every thirty minutes of stagnation, you should have at least one minute of stimulation.",
  "This workout packs in a full-body exercise routine in a fraction of the time. But as with any exercise, be careful. There are numerous apps to get you started.",
  "Raise your pulse rate to 120 beats per minute for 20 straight minutes four or five times a week doing anything you enjoy. Regularly raising your heart rate results in improved cardiovascular health.",
  "Studies have shown that stair climbing, which is considered vigorous-intensity physical activity, burns more calories per minute than jogging.",
  "Art therapy is known to have great mental health benefits, especially when it comes to stress management. How about writing a quick poem, taking a picture or painting something small?",
  "A clean space helps your focus at work and is often linked to positive emotions like happiness.",
  "Nature is linked to positive emotions and decreased stress and anxiety. Whenever possible, try to take your daily lunch break outside, surrounded by some greenery.",
  "If you use public transport regularly, you can stand instead of sitting. If it is possible, try to replace as many of your daily trips as possible with walking or cycling.",
  "Yawning can be really helpful, as it produces tears to help moisten and lubricate the eyes.",
  "Hold one finger close to the eye and focus on it. Slowly move the finger away, focus far into the distance and then back to the finger. Bring the finger back and focus on something far away.",
  "While seated, brace elbows on the desk and close to the desk edge. Let your weight fall forward and cup hands over eyes. Close your eyes and inhale slowly through nose and hold for few seconds. Continue deep breathing.",
  "Squeeze a pair of balled-up socks or a soft rubber ball, hold for 5 seconds. Repeat whole process a few times.",
  "Emerging research suggests potential for use of controlled slow breathing techniques as a means of optimising physiological parameters that appear to be associated with health and longevity.",
  "Close your eyes and imagine yourself in a peaceful and calming place, such as a beach or a forest, focusing on the sights, sounds, and sensations of that environment.",
  "Try the 5-4-3-2-1 Grounding Technique: Identify 5 things you can see, 4 things you can touch, 3 things you can hear, 2 things you can smell, and 1 thing you can taste.",
]

[idle]
enabled = true
reset_after = "5m"
respect_idle_inhibitors = false

[recovery]
wake_grace = "3s"
missed_break = "show-once"
suspend_counts_as_break = true
lock_counts_as_break = true
recover_active_break = true

[fullscreen]
behavior = "show" # show is the dependable MVP behavior
max_delay = "10m"

[startup]
start_paused = false
recover_state = true

[hyprland]
enabled = true
submap_fallback = true # enforce blocking through a temporary Hyprland submap

[tray]
enabled = true

[logging]
level = "info"
format = "journald"
